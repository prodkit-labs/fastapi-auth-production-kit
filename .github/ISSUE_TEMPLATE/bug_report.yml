name: Bug report
description: Report a reproducible bug in the local starter.
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, settings, and expected behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, dependency install command, and database mode.
    validations:
      required: true
